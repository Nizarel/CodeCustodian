# Ruff configuration for CodeCustodian
# https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 100
src = ["src"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "T20",  # flake8-print
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[lint.isort]
known-first-party = ["codecustodian"]

[format]
quote-style = "double"
indent-style = "space"
