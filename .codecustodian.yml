version: "1.0"

scanners:
  deprecated_apis:
    enabled: true
    severity: high
    libraries:
      - pandas
      - numpy
      - requests
      - django
      - flask

  todo_comments:
    enabled: true
    max_age_days: 90
    patterns:
      - TODO
      - FIXME
      - HACK
      - XXX

  code_smells:
    enabled: true
    cyclomatic_complexity: 10
    function_length: 50
    nesting_depth: 4
    max_parameters: 5

  security_patterns:
    enabled: true

  type_coverage:
    enabled: true
    target_coverage: 80

behavior:
  max_prs_per_run: 5
  require_human_review: true
  auto_merge: false
  draft_prs_for_complex: true
  confidence_threshold: 7

github:
  pr_labels:
    - tech-debt
    - automated
    - codecustodian
  base_branch: main
  branch_prefix: tech-debt
  delete_branch_on_merge: true

advanced:
  copilot:
    model_selection: auto
    temperature: 0.1
    max_tokens: 4096

  git:
    author_name: CodeCustodian
    author_email: bot@codecustodian.dev

  testing:
    framework: pytest
    coverage_threshold: 80

  linting:
    tools:
      - ruff
      - mypy
      - bandit
    fail_on: new_violations_only

  exclude_paths:
    - "vendor/**"
    - "node_modules/**"
    - ".venv/**"
    - "build/**"
    - "dist/**"
