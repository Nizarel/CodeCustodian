name: CI Self-Heal

on:
  workflow_run:
    workflows: ["CI", "Security Scan"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  analyze-failure:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Fetch workflow failure context
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            repos/$REPO/actions/runs/$RUN_ID/jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name + "\n" + (.steps[] | select(.conclusion == "failure") | (.name + ": " + (.conclusion // "")))' \
            > ci_failure.log

      - name: Create fallback sample log for manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "Manual CI self-heal dispatch. Provide failure log content via artifacts in future iterations." > ci_failure.log

      - name: Build healing plan
        run: python -m codecustodian heal --failure-log ci_failure.log --output-format json > healing-plan.json

      - name: Upload healing plan
        uses: actions/upload-artifact@v4
        with:
          name: healing-plan
          path: healing-plan.json

      - name: Comment healing plan on PR
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('healing-plan.json', 'utf8'));
            const marker = '<!-- codecustodian-healing-plan -->';
            const pullRequests = context.payload.workflow_run.pull_requests || [];
            if (!pullRequests.length) {
              core.info('No pull request associated with this workflow run; skipping comment.');
              return;
            }
            const prNumber = pullRequests[0].number;

            const commands = (plan.recommended_commands || [])
              .map((cmd) => `- \`${cmd}\``)
              .join('\n');

            const patches = (plan.patch_candidates || [])
              .slice(0, 5)
              .map((p) => `- **${p.title}** (${p.target_file}:${p.target_line})\n  - ${p.patch_hint}`)
              .join('\n');

            const body = [
              marker,
              '## CodeCustodian Healing Plan',
              '',
              `Status: **${plan.status}**`,
              plan.summary || '',
              '',
              '### Recommended Commands',
              commands || '- No command recommendations generated.',
              '',
              '### Patch Candidates',
              patches || '- No patch candidates detected from current logs.',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.data.find((c) =>
              typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
