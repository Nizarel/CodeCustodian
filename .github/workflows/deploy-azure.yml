# ────────────────────────────────────────────────────────────
# deploy-azure.yml — CI/CD for CodeCustodian Azure deployment
# Target subscription: da9dea7f-1fc8-44de-93da-ce5c58314cdb
# ────────────────────────────────────────────────────────────
name: Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-azure.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: 'Container image tag'
        required: false
        default: 'latest'

permissions:
  id-token: write
  contents: read

env:
  SUBSCRIPTION_ID: da9dea7f-1fc8-44de-93da-ce5c58314cdb
  RESOURCE_GROUP: codecustodian-prod-rg
  LOCATION: eastus2

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  build-and-push:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          ACR_NAME=$(az acr list -g ${{ env.RESOURCE_GROUP }} --query '[0].name' -o tsv 2>/dev/null || echo "")
          if [ -z "$ACR_NAME" ]; then
            echo "ACR not found — will be created by infra deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "login_server=$(az acr show -n $ACR_NAME --query loginServer -o tsv)" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: ACR Login
        if: steps.acr.outputs.skip != 'true'
        run: az acr login --name $(echo ${{ steps.acr.outputs.login_server }} | cut -d. -f1)

      - name: Build & push image
        if: steps.acr.outputs.skip != 'true'
        run: |
          IMAGE="${{ steps.acr.outputs.login_server }}/codecustodian"
          TAG="${{ inputs.image_tag || github.sha }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  deploy-infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags project=codecustodian environment=${{ inputs.environment || 'prod' }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            environment=${{ inputs.environment || 'prod' }}
            imageTag=${{ inputs.image_tag || 'latest' }}
          deploymentName: codecustodian-${{ github.run_number }}
